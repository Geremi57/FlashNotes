name: continuos intergration

on:pull_request:
branches: [master]

jobs:test_pull_request:
runs-on: ubuntu-latest

steps:
- name: Checkout repository
- uses: actions/checkout@v3

- name: Setup Node
- uses: actions/checkout@v3

  with:
  node-version: 18

- name: Install dependecies
  run: npm ci

- name: Run tests
  run: npm test

- name: Build project
  run: npm run build

